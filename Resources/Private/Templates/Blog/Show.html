<style>
    /* Form container */
form {
    max-width: 500px;
    margin: 30px 0;
    padding: 25px;
    border: 1px solid #ddd;
    border-radius: 8px;
    background-color: #f9f9f9;
    box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    font-family: Arial, sans-serif;
}

/* Labels */
form label {
    font-weight: bold;
    margin-bottom: 5px;
    display: inline-block;
}

/* Inputs & textarea */
form input[type="text"],
form textarea {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
    margin-bottom: 15px;
    border: 1px solid #ccc;
    border-radius: 5px;
    font-size: 14px;
    transition: border 0.3s ease;
}

/* Focus effect */
form input[type="text"]:focus,
form textarea:focus {
    border-color: #007BFF;
    outline: none;
}

/* Submit button */
form input[type="submit"] {
    background-color: #007BFF;
    color: white;
    border: none;
    padding: 10px 18px;
    border-radius: 5px;
    cursor: pointer;
    font-size: 15px;
    transition: background 0.3s ease;
}

/* Hover effect */
form input[type="submit"]:hover {
    background-color: #0056b3;
}

/* Spacing between fields */
form div {
    margin-bottom: 10px;
}
</style>
<h1>{blog.title}</h1>

<!--Event-->
<p><strong>Views:</strong> {blog.views}</p>

<div class="blog-detail">

    <p><f:format.stripTags>{blog.description}</f:format.stripTags></p>

    <f:if condition="{blog.images}">
        <f:image image="{blog.images}" width="600" />
    </f:if>

    <p>
        <f:link.page pageUid="{settings.listPid}">
            Back to Blog List
        </f:link.page>
    </p>

</div>

<h3>Add Comment</h3>

<f:form action="createComment" controller="Blog" extensionName="NsBlogSystem" pluginName="BlogList" object="{comment}" method="post">

    <f:form.hidden name="blog" value="{blog.uid}" />

    <label>Name</label>
    <f:form.textfield property="name" required="1" />

    <label>Email</label>
    <f:form.textfield property="email" required="1" />

    <label>Comment</label>
    <f:form.textarea property="comment" required="1" />

    <f:form.submit value="Submit Comment" />

</f:form>

<h3>Comments</h3>

<f:for each="{blog.comments}" as="comment">

    <f:if condition="{comment.approved}">

        <div style="border:1px solid #ccc; padding:10px; margin-bottom:10px;">
            <strong>{comment.name}</strong><br>
            <p>{comment.comment}</p>
        </div>

    </f:if>

</f:for>
