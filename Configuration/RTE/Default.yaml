imports:
  - { resource: 'EXT:rte_ckeditor/Configuration/RTE/Processing.yaml' }
  - { resource: 'EXT:rte_ckeditor/Configuration/RTE/Editor/Base.yaml' }

editor:
  config:
    toolbar:
      items:
        - heading
        - style
        - '|'
        - bold
        - italic
        - '|'
        - fontFamily
        - fontSize
        - fontColor
        - fontBackgroundColor
        - '|'
        - bulletedList
        - numberedList
        - '|'
        - blockQuote
        - '|'
        - link
        - '|'
        - removeFormat
        - '|'
        - undo
        - redo
        - '|'
        - insertTable
        - '|'
        - sourceEditing
        - '|'
        - fullscreen

    fullscreen:
      menuBar:
        isVisible: false

    heading:
      options:
        - { model: 'paragraph', title: 'Paragraph', class: 'ck-heading_paragraph' }
        - { model: 'heading1', view: 'h1', title: 'Heading 1', class: 'ck-heading_heading1' }
        - { model: 'heading2', view: 'h2', title: 'Heading 2', class: 'ck-heading_heading2' }
        - { model: 'heading3', view: 'h3', title: 'Heading 3', class: 'ck-heading_heading3' }
        - { model: 'heading4', view: 'h4', title: 'Heading 4', class: 'ck-heading_heading4' }
        - { model: 'heading5', view: 'h5', title: 'Heading 5', class: 'ck-heading_heading5' }
        - { model: 'preformatted', view: 'pre', title: 'Preformatted', class: 'ck-heading_preformatted' }

    style:
      definitions:
        - { name: "Red Text", element: "p", classes: [ "text-red" ] }
        - { name: "Highlight", element: "p", classes: [ "highlight" ] }
        - { name: "Button", element: "a", classes: [ "btn", "btn-primary" ] }
        - { name: "Code Block", element: "pre", classes: [ "code-block" ] }

    fontColor:
      colors:
        - { label: 'Orange', color: '#ff8700' }
        - { label: 'Blue', color: '#0080c9' }
        - { label: 'Green', color: '#209d44' }

    fontBackgroundColor:
      colors:
        - { label: 'Light Orange', color: '#fab85c' }

    fontFamily:
      options:
        - 'default'
        - 'Arial, sans-serif'
        - 'Courier New, monospace'

    fontSize:
      options:
        - 'default'
        - 14
        - 18
        - 21

    importModules:
      - { module: '@ckeditor/ckeditor5-font', exports: [ 'Font' ] }
      - { module: '@ckeditor/ckeditor5-fullscreen', exports: [ 'Fullscreen' ] }
